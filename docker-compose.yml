version: "3.9"

services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: enterprise_php
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./:/var/www/html
    working_dir: /var/www/html
    command: php -S 0.0.0.0:8000 -t public
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    container_name: enterprise_postgres
    restart: always
    environment:
      POSTGRES_DB: enterprise_platform
      POSTGRES_USER: rich
      POSTGRES_PASSWORD: richpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: enterprise_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: rich@admin.com
      PGADMIN_DEFAULT_PASSWORD: richpassword
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
